name: CI/CD Pipeline

# Trigger on push to main/develop and on pull requests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build, Test, Coverage & Format Check
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v7

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      # 3. Compile
      - name: Compile
        run: mvn clean compile

      # 4. Run tests with Surefire
      - name: Run Tests (Surefire)
        run: mvn test

      # 5. Verify JaCoCo coverage (90% threshold)
      - name: Verify Code Coverage (90% threshold)
        run: mvn jacoco:check

      # 6. Check code formatting (Spotless)
      - name: Check Code Formatting (Spotless)
        run: mvn spotless:check

      # 7. Generate coverage report
      - name: Generate JaCoCo Coverage Report
        run: mvn jacoco:report

      # 8. Upload coverage to artifacts (optional, for visibility)
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      # 9. Upload coverage to Codecov (auto-updates badge)
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # 10. Comment on PR with coverage info (if PR)
      - name: Post Coverage Summary to PR
        if: github.event_name == 'pull_request'
        run: |
          echo "✅ **Build Summary**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ✅ 90%+ |" >> $GITHUB_STEP_SUMMARY
          echo "| Formatting | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  # Optional: Lint and static analysis (can expand later)
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      # Full verify (compiles, tests, checks coverage, checks format)
      - name: Run Full Maven Verify
        run: mvn clean verify

      # Summary
      - name: Print Success Message
        run: |
          echo "✅ All checks passed!"
          echo "   - Tests: Passed"
          echo "   - Coverage: 90%+ verified"
          echo "   - Formatting: Google Java Format compliant"